version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: insightflow_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-insightflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-insightflow123}
      POSTGRES_DB: ${POSTGRES_DB:-insightflow_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-insightflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    container_name: insightflow_n8n
    restart: always
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-admin123}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Jakarta
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-insightflow_db}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-insightflow}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-insightflow123}
      - DB_POSTGRESDB_SCHEMA=n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    # CATATAN: n8n hanya boleh diakses via internal network di production
    # Hapus "ports" di production dan gunakan reverse proxy

volumes:
  postgres_data:
  n8n_data:
