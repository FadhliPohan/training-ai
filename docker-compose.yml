services:
  postgres:
    image: postgres:15-alpine
    container_name: insightflow_postgres
    restart: always
    environment:
      POSTGRES_USER: insightflow
      POSTGRES_PASSWORD: insightflow123
      POSTGRES_DB: insightflow_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  n8n:
    image: n8nio/n8n:latest
    container_name: insightflow_n8n
    restart: always
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123
      - N8N_HOST=n8n
      - N8N_PORT=5678
      - WEBHOOK_URL=http://n8n:5678/
      - GENERIC_TIMEZONE=Asia/Jakarta
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=insightflow_db
      - DB_POSTGRESDB_USER=insightflow
      - DB_POSTGRESDB_PASSWORD=insightflow123
      - DB_POSTGRESDB_SCHEMA=n8n
    ports:
      - "5678:5678"
    depends_on:
      - postgres

volumes:
  postgres_data: